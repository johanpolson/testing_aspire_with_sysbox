name: CICD

on:
  push:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0

    steps:
      - uses: actions/checkout@v4

      - name: Install Sysbox
        run: |
          apt update -y
          apt install ca-certificates curl
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc

          tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}")
          Components: stable
          Architectures: $(dpkg --print-architecture)
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF

          apt update -y

          apt install docker-ce docker-ce-cli -y

      - name: Install Sysbox
        run: |
          wget https://github.com/nestybox/sysbox/releases/download/v0.7.0/sysbox-ce_0.7.0.linux_amd64.deb
          sudo apt-get install ./sysbox-ce_0.7.0.linux_amd64.deb -y
          sudo apt-get install jq -y
          sudo echo /etc/docker/daemon.json | jq '. + { features: [{ "time-namespaces": false }]}' > /etc/docker/daemon.json
          sudo echo /etc/docker/daemon.json
          echo "Restarting docker service"
          sudo systemctl restart docker

      - name: dotnet run
        run: dotnet run
